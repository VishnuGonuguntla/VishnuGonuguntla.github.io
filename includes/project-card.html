<article class="project-card" data-repo="{{ include.project.repo }}">
  <div class="card-inner">
    <header class="card-header">
      <div class="card-icon">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M3 7c0-1.1.9-2 2-2h14a2 2 0 0 1 2 2v10a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V7z"/><path d="M3 7l9 6 9-6"/></svg>
      </div>
      <div class="card-meta-live" id="stats-{{ include.project.repo }}">
        <!-- Live stats injected by JS -->
      </div>
    </header>

    <h2 class="card-title">
      <a href="{{ include.project.url | relative_url }}">{{ include.project.title }}</a>
    </h2>

    <p class="card-desc">{{ include.project.description | default: "No description provided." }}</p>

    {% if include.project.tags %}
    <div class="card-tags">
      {% for tag in include.project.tags %}
        <span class="tag">{{ tag }}</span>
      {% endfor %}
    </div>
    {% endif %}

    <footer class="card-footer">
      <a href="{{ include.project.url | relative_url }}" class="card-link">Read more →</a>
      {% if include.project.repo %}
        <a href="https://github.com/{{ site.github_username }}/{{ include.project.repo }}" class="card-link card-link--gh" target="_blank" rel="noopener">GitHub ↗</a>
      {% endif %}
    </footer>
  </div>
</article>
